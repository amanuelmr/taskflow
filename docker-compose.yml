# Docker Compose configuration for a microservices architecture with User, Task,
# and Notification services. Includes RabbitMQ and a separate PostgreSQL database
# per service. All credentials come from the .env file (see .env.example).
services:
  # User Service
  user-service:
    build: ./user_service
    container_name: user_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./user_service:/app
    ports:
      - "8001:8000"
    environment:
      DATABASE_NAME: user_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres-user
      DATABASE_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      SECRET_KEY: ${SECRET_KEY_USER}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      - rabbitmq
      - postgres-user

  # Task Service
  task-service:
    build: ./task_service
    container_name: task_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./task_service:/app
    ports:
      - "8002:8000"
    environment:
      DATABASE_NAME: task_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres-task
      DATABASE_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SECRET_KEY: ${SECRET_KEY_TASK}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      - rabbitmq
      - postgres-task

  # Notification Service
  notification-service:
    build: ./notification_service
    container_name: notification_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./notification_service:/app
    ports:
      - "8003:8000"
    environment:
      DATABASE_NAME: notification_db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_HOST: postgres-notification
      DATABASE_PORT: 5432
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SECRET_KEY: ${SECRET_KEY_NOTIFICATION}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
    depends_on:
      - rabbitmq
      - postgres-notification

  # RabbitMQ
  rabbitmq:
    image: "rabbitmq:3-management"
    ports:
      - "5672:5672"
      - "15672:15672"

  # PostgreSQL for User Service
  postgres-user:
    image: postgres:13
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5435:5432"

  # PostgreSQL for Task Service
  postgres-task:
    image: postgres:13
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5436:5432"

  # PostgreSQL for Notification Service
  postgres-notification:
    image: postgres:13
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5437:5432"
